name: TypeWrong
options:
  bundleIdPrefix: com.fam
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  TypeWrongApp:
    type: application
    platform: iOS
    sources:
      - path: TypeWrongApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fam.TypeWrong
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_CFBundleDisplayName: TypeWrong
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: TypeWrongKeyboard
    scheme:
      testTargets:
        - TypeWrongTests

  TypeWrongKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: TypeWrongKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fam.TypeWrong.Keyboard
        INFOPLIST_FILE: TypeWrongKeyboard/Info.plist
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  TypeWrongTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TypeWrongTests
      - path: TypeWrongKeyboard/KeyboardLayout.swift
    dependencies:
      - target: TypeWrongApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fam.TypeWrongTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
